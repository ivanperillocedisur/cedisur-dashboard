<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F3EF;
    --surface: #FFFFFF;
    --border: #D8D4CC;
    --text: #1A1814;
    --text2: #6B6760;
    --text3: #9E9B97;
    --accent: #1d3a8f;
    --accent-light: #E8EDFB;
    --accent-text: #1d3a8f;
    --card-presencial-bg: #FFF5ED;
    --card-presencial-border: #F5C99A;
    --card-ecom-bg: #EAF5FB;
    --card-ecom-border: #90CDE8;
    --card-tel-bg: #F3EEFB;
    --card-tel-border: #C3A8E8;
    --card-bought-bg: #E6F7ED;
    --card-bought-border: #7DC99A;
    --card-notbought-bg: #FDEAEA;
    --card-notbought-border: #E89090;
    --btn-check-color: #2D8A52;
    --btn-x-color: #C0392B;
    --shadow: 0 1px 3px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 2rem; }

  /* HEADER */
  .header { background: var(--accent); padding: 1.25rem 1.25rem 1rem; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .app-name { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: rgba(255,255,255,0.55); text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .today-badge { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.12); padding: 3px 10px; border-radius: 20px; }
  .test-badge { font-size: 11px; font-weight: 700; color: #fff; background: #E8A020; padding: 3px 10px; border-radius: 20px; }
  .btn-search { background: none; border: none; cursor: pointer; padding: 4px; color: rgba(255,255,255,0.75); display: flex; align-items: center; -webkit-tap-highlight-color: transparent; }

  /* BUSCADOR */
  .search-overlay { display: none; padding: 0 0 0.75rem; }
  .search-overlay.active { display: block; }
  .search-input-wrap { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); border-radius: 8px; padding: 0.5rem 0.75rem; }
  .search-input-wrap svg { width: 14px; height: 14px; flex-shrink: 0; }
  .search-input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; }
  .search-input::placeholder { color: rgba(255,255,255,0.45); }
  .btn-search-clear { background: none; border: none; cursor: pointer; padding: 0; color: rgba(255,255,255,0.5); font-size: 16px; line-height: 1; }

  .vendedor-display { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 0.75rem; }

  .days-strip { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
  .days-strip::-webkit-scrollbar { display: none; }
  .day-tab { flex-shrink: 0; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); background: transparent; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .day-tab.active { background: #fff; color: var(--accent); border-color: transparent; font-weight: 600; }

  /* STATS */
  .stats-bar { display: flex; gap: 8px; padding: 1rem 1.25rem 0.5rem; }
  .stat { flex: 1; background: var(--surface); border-radius: 10px; padding: 0.6rem 0.75rem; border: 1px solid var(--border); text-align: center; }
  .stat.bought { background: var(--card-bought-bg); border-color: var(--card-bought-border); }
  .stat.notbought { background: var(--card-notbought-bg); border-color: var(--card-notbought-border); }
  .stat-num { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--text); line-height: 1.1; }
  .stat.bought .stat-num { color: #1F7A42; }
  .stat.notbought .stat-num { color: #A02020; }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .stat.bought .stat-label { color: #2D8A52; }
  .stat.notbought .stat-label { color: #C0392B; }

  /* FILTROS */
  .filter-bar { display: flex; gap: 8px; padding: 0.25rem 1.25rem 0.5rem; justify-content: center; }
  .filter-chip { display: flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 20px; border: 1px solid transparent; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--text2); user-select: none; -webkit-tap-highlight-color: transparent; }
  .filter-chip.presencial { background: var(--card-presencial-bg); border-color: var(--card-presencial-border); }
  .filter-chip.ecom { background: var(--card-ecom-bg); border-color: var(--card-ecom-border); }
  .filter-chip.telefonico { background: var(--card-tel-bg); border-color: var(--card-tel-border); }
  .filter-chip input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }

  /* LISTA */
  .list { padding: 0.5rem 1.25rem; display: flex; flex-direction: column; gap: 8px; }
  .search-results-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); padding: 0.75rem 1.25rem 0.25rem; }

  /* TARJETAS */
  .client-card { border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; transition: background 0.2s, border-color 0.2s, opacity 0.2s; }
  .client-card.presencial { background: var(--card-presencial-bg); border: 1px solid var(--card-presencial-border); }
  .client-card.ecom { background: var(--card-ecom-bg); border: 1px solid var(--card-ecom-border); }
  .client-card.telefonico { background: var(--card-tel-bg); border: 1px solid var(--card-tel-border); }
  .client-card.bought { background: var(--card-bought-bg) !important; border-color: var(--card-bought-border) !important; }
  .client-card.notbought { background: var(--card-notbought-bg) !important; border-color: var(--card-notbought-border) !important; opacity: 0.75; }
  .client-card.notbought .client-name { text-decoration: line-through; color: var(--text3); }

  .card-main { padding: 0.875rem 0.875rem 0.875rem 1rem; display: flex; align-items: center; gap: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
  .order-num { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text3); min-width: 22px; flex-shrink: 0; }
  .client-info { flex: 1; min-width: 0; }
  .client-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .client-card.expanded .client-name { -webkit-line-clamp: unset; overflow: visible; }
  .client-subtext { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* CHIP DE SOLICITUD PENDIENTE (visible sin abrir) */
  .sol-chip { display: none; margin-top: 5px; }
  .sol-chip.visible { display: inline-flex; align-items: center; gap: 4px; background: #F5F0FF; border: 1px solid #C4B5FD; border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: 600; color: #7C3AED; }

  .card-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .btn-action { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }

  .btn-action svg { width: 15px; height: 15px; pointer-events: none; }
  .client-card.bought .btn-check { background: var(--btn-check-color); border-color: var(--btn-check-color); }
  .client-card.notbought .btn-x { background: var(--btn-x-color); border-color: var(--btn-x-color); }

  .card-detail { display: none; padding: 0 1rem 1rem 1rem; }

  .btn-maps { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; margin-top: 0.75rem; font-size: 13px; font-weight: 600; color: var(--accent-text); background: var(--accent-light); border: none; padding: 9px 12px; border-radius: 8px; cursor: pointer; text-decoration: none; font-family: 'DM Sans', sans-serif; }
  .btn-maps svg { width: 13px; height: 13px; }

  /* BOTÓN SOLICITAR CAMBIO */
  .btn-solicitar { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; margin-top: 8px; font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: #7C3AED; background: #F5F0FF; border: 1.5px solid #C4B5FD; padding: 9px 12px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; text-transform: uppercase; }
  .btn-solicitar:active { background: #EDE9FE; }
  .btn-solicitar svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* MODAL SOLICITUD */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 20px 20px 0 0; padding: 1.5rem 1.25rem 2rem; width: 100%; max-width: 480px; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 1.25rem; }
  .modal-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .modal-cliente { font-size: 12px; color: var(--text3); margin-bottom: 1.25rem; font-weight: 500; }

  .tipo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.25rem; }
  .tipo-btn { padding: 0.75rem 0.4rem; border-radius: 10px; border: 2px solid var(--border); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.03em; color: var(--text2); cursor: pointer; text-align: center; transition: all 0.15s; line-height: 1.4; text-transform: uppercase; }
  .tipo-btn .tipo-icon { display: block; font-size: 18px; margin-bottom: 4px; }
  .tipo-btn.selected { border-color: #7C3AED; background: #F5F0FF; color: #7C3AED; }

  .modal-field { margin-bottom: 1rem; }
  .modal-field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
  .modal-field input, .modal-field select, .modal-field textarea { width: 100%; padding: 0.6rem 0.75rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: #fff; outline: none; }
  .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { border-color: #7C3AED; }
  .modal-field textarea { resize: none; height: 80px; }

  .modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
  .btn-cancelar { flex: 1; padding: 0.75rem; border-radius: 10px; border: 1.5px solid var(--border); background: transparent; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; color: var(--text2); cursor: pointer; }
  .btn-enviar { flex: 2; padding: 0.75rem; border-radius: 10px; border: none; background: #7C3AED; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }

  .confirm-popup { background: #E6F7ED; border: 1.5px solid #7DC99A; border-radius: 20px; padding: 2rem 1.5rem; width: 100%; max-width: 340px; text-align: center; animation: popIn 0.2s ease; }

  .btn-reset { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: underline; padding: 4px; }
</style>
</head>

<div class="header">

</div>

<div id="app-content"></div>

<!-- MODAL SOLICITUD -->
<div class="modal-overlay" id="modal-overlay">

    <div class="modal-handle"></div>
    <div class="modal-title">Solicitar cambio</div>
    <div class="modal-cliente" id="modal-cliente-nombre"></div>
    <div class="tipo-grid">

    <div id="campo-dia" class="modal-field" style="display:none">

        <option>JUEVES</option><option>VIERNES</option>

    </div>
    <div id="campo-eliminar" class="modal-field" style="display:none">
      <label>Motivo (opcional)</label>
      <textarea id="input-motivo" placeholder="Ej: El cliente cerró el local..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-enviar" id="btn-enviar" disabled onclick="enviarSolicitud()">Enviar solicitud</button>
    </div>
  </div>
</div>

<!-- POP-UP CONFIRMACIÓN -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-popup">
    <div class="confirm-icon">
      <svg viewBox="0 0 28 28" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">

      </svg>
    </div>
    <div class="confirm-title">¡Solicitud enviada!</div>
    <div class="confirm-detail" id="confirm-detail"></div>
    <button class="btn-confirm-close" onclick="cerrarConfirm()">Aceptar</button>
  </div>
</div>

  {cod:'C0472',nom:'HOTELES Y CASINOS DEL RIO CATRIEL',loc:'CATRIEL',dir:'CACIQUE CATRIEL Y ANTARTIDA ARGENTINA ESQ.',ord:2,dia:'JUEVES',canal:'Presencial'},
  {cod:'C4549b',nom:'BODEGON A LO PABLO',loc:'GENERAL ROCA',dir:'RUTA 22 Y PALMIERI (RUTA 6)',ord:3,dia:'JUEVES',canal:'Presencial'},
  {cod:'C2690b',nom:'HOTELES Y CASINOS DEL RIO CIPOLLETTI',loc:'CIPOLLETTI',dir:'RUTA 22 KM 1216',ord:4,dia:'JUEVES',canal:'Presencial'},
  {cod:'C6854',nom:'BRONESA',loc:'GENERAL ROCA',dir:'MENDOZA 1588',ord:7,dia:'JUEVES',canal:'Presencial'},

  {cod:'C6651',nom:'E- DISTRIBUIDORA AURON',loc:'GENERAL ROCA',dir:'NICARAGUA 724',ord:15,dia:'JUEVES',canal:'Ecommerce'},
  {cod:'C1547',nom:'BAKAN CERVECERIA',loc:'GENERAL ROCA',dir:'MAIPU 1415',ord:1,dia:'VIERNES',canal:'Presencial'},
  {cod:'C4676',nom:'CAFE 43',loc:'GENERAL ROCA',dir:'TUCUMAN & BELGRANO',ord:2,dia:'VIERNES',canal:'Presencial'},
  {cod:'C4652',nom:'CONFITERIA Y REPOSTERIA EL MOLINO',loc:'GENERAL ROCA',dir:'AVENIDA ROCA 926',ord:3,dia:'VIERNES',canal:'Presencial'},
  {cod:'C6429b',nom:'E- BARRIO MARKET',loc:'GENERAL ROCA',dir:'VITERBORI 313 LOCAL:3',ord:4,dia:'VIERNES',canal:'Ecommerce'},
  {cod:'C3457',nom:'FORTUNATA',loc:'GENERAL ROCA',dir:'VITERBORI 150',ord:9,dia:'VIERNES',canal:'Presencial'},
  {cod:'C5208',nom:'LOPEZ MARIO',loc:'GENERAL ROCA',dir:'RHODE 708',ord:15,dia:'VIERNES',canal:'Presencial'},
  {cod:'C4675',nom:'JK HUERGO',loc:'INGENIERO HUERGO',dir:'AV COLON & RIVADAVIA',ord:22,dia:'VIERNES',canal:'Presencial'},
];

let selectedDay = 'LUNES';
let searchQuery = '';
let modalCodigo = null;
let tipoSeleccionado = null;
const stateMap = {};
const solicitudes = {};

function todayDayName() {
  return ['DOMINGO','LUNES','MARTES','MIERCOLES','JUEVES','VIERNES','SABADO'][new Date().getDay()];
}
function canalClass(canal) {
  if (!canal) return 'presencial';
  const c = canal.toLowerCase();
  if (c.includes('ecom') || c.includes('auto')) return 'ecom';
  if (c.includes('telef')) return 'telefonico';
  return 'presencial';
}
function mapsUrl(dir, loc) {
  return 'https://maps.google.com/?q=' + encodeURIComponent(dir + ', ' + loc + ', Argentina');
}
function tipoLabel(tipo) {
  if (tipo === 'orden') return '📋 Cambio de orden';
  if (tipo === 'dia') return '📅 Cambio de día';
  return '🗑️ Eliminar del ruteo';
}

// ── BÚSQUEDA ──────────────────────────────────────────────────────────────────
function toggleSearch() {
  const overlay = document.getElementById('search-overlay');
  const input = document.getElementById('search-input');
  const isActive = overlay.classList.toggle('active');
  if (isActive) { setTimeout(function() { input.focus(); }, 100); }
  else { searchQuery = ''; input.value = ''; renderDay(); }
}
function clearSearch() {
  searchQuery = '';
  const input = document.getElementById('search-input');
  if (input) input.value = '';
  renderDay();
}
function onSearch() {
  searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
  if (searchQuery) renderSearch();
  else renderDay();
}
function renderSearch() {
  const matches = DATA.filter(function(r) {
    return r.nom.toLowerCase().includes(searchQuery) ||
           r.dir.toLowerCase().includes(searchQuery) ||
           r.loc.toLowerCase().includes(searchQuery);
  });
  const content = document.getElementById('app-content');
  content.innerHTML = '';
  if (!matches.length) {
    content.innerHTML = '<div class="empty"><div class="empty-text">Sin resultados.</div></div>';
    return;
  }
  const label = document.createElement('div');
  label.className = 'search-results-label';
  label.textContent = matches.length + ' resultado' + (matches.length !== 1 ? 's' : '');
  content.appendChild(label);
  const list = document.createElement('div');
  list.className = 'list';
  matches.forEach(function(c) { list.appendChild(buildCard(c, true)); });
  content.appendChild(list);
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function abrirModal(cod) {
  const c = DATA.find(function(x) { return x.cod === cod; });
  if (!c) return;
  modalCodigo = cod;
  tipoSeleccionado = null;
  document.getElementById('modal-cliente-nombre').textContent = c.nom + ' · ' + c.loc;
  document.querySelectorAll('.tipo-btn').forEach(function(b) { b.classList.remove('selected'); });
  document.getElementById('campo-orden').style.display = 'none';
  document.getElementById('campo-dia').style.display = 'none';
  document.getElementById('campo-eliminar').style.display = 'none';
  document.getElementById('input-orden').value = '';
  document.getElementById('input-dia').value = '';
  document.getElementById('input-motivo').value = '';
  document.getElementById('btn-enviar').disabled = true;
  document.getElementById('modal-overlay').classList.add('open');
}
function cerrarModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalCodigo = null;
  tipoSeleccionado = null;
}
function selectTipo(btn) {
  document.querySelectorAll('.tipo-btn').forEach(function(b) { b.classList.remove('selected'); });
  btn.classList.add('selected');
  tipoSeleccionado = btn.dataset.tipo;
  document.getElementById('campo-orden').style.display = tipoSeleccionado === 'orden' ? 'block' : 'none';
  document.getElementById('campo-dia').style.display = tipoSeleccionado === 'dia' ? 'block' : 'none';
  document.getElementById('campo-eliminar').style.display = tipoSeleccionado === 'eliminar' ? 'block' : 'none';
  validarEnvio();
}
function validarEnvio() {
  let ok = false;
  if (tipoSeleccionado === 'orden') ok = parseInt(document.getElementById('input-orden').value) > 0;
  else if (tipoSeleccionado === 'dia') ok = document.getElementById('input-dia').value !== '';
  else if (tipoSeleccionado === 'eliminar') ok = true;
  document.getElementById('btn-enviar').disabled = !ok;
}
function enviarSolicitud() {
  const c = DATA.find(function(x) { return x.cod === modalCodigo; });
  if (!c) return;

  let detalle = '';
  if (tipoSeleccionado === 'orden') detalle = 'Nuevo orden solicitado: ' + document.getElementById('input-orden').value;
  else if (tipoSeleccionado === 'dia') detalle = 'Nuevo día solicitado: ' + document.getElementById('input-dia').value;
  else {
    const motivo = document.getElementById('input-motivo').value.trim();
    detalle = motivo ? 'Motivo: ' + motivo : 'Sin motivo especificado';
  }

  const payload = {
    vendedor:  'David Bertrán',
    codigo:    c.cod.replace(/[ab]$/, ''),
    cliente:   c.nom,
    localidad: c.loc,
    diaActual: c.dia,
    tipo:      tipoSeleccionado === 'orden' ? 'Cambio de orden' : tipoSeleccionado === 'dia' ? 'Cambio de día' : 'Eliminar del ruteo',
    detalle:   detalle
  };

  solicitudes[modalCodigo] = { tipo: tipoSeleccionado, detalle: detalle, nom: c.nom };
  cerrarModal();

  // Mostrar pop-up inmediatamente (optimista)
  document.getElementById('confirm-detail').innerHTML =
    '<strong>' + c.nom + '</strong><br>' + tipoLabel(tipoSeleccionado) + '<br><span style="color:#3D8A56">' + detalle + '</span>';
  document.getElementById('confirm-overlay').classList.add('open');

  if (searchQuery) renderSearch();
  else renderDay();

  // Enviar al Apps Script en segundo plano
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(function(err) {
    console.warn('Error al enviar solicitud:', err);
  });
}
function cerrarConfirm() {
  document.getElementById('confirm-overlay').classList.remove('open');
}

// ── TARJETA ───────────────────────────────────────────────────────────────────
function setClientState(cod, state) {
  if (stateMap[cod] === state) delete stateMap[cod];
  else stateMap[cod] = state;
  if (searchQuery) renderSearch();
  else renderDay();
}

function buildCard(c, isSearch) {
  const state = stateMap[c.cod];
  const cc = canalClass(c.canal);
  const stateClass = state === 'bought' ? ' bought' : state === 'notbought' ? ' notbought' : '';
  const checkStroke = state === 'bought' ? '#fff' : '#9E9B97';
  const xStroke = state === 'notbought' ? '#fff' : '#9E9B97';
  const sol = solicitudes[c.cod];

  const card = document.createElement('div');
  card.className = 'client-card ' + cc + stateClass;
  card.id = 'card-' + c.cod;
  card.dataset.canal = cc;

  const btnCheck = document.createElement('button');
  btnCheck.className = 'btn-action btn-check';
  btnCheck.innerHTML = '<svg viewBox="0 0 14 14" fill="none" stroke="' + checkStroke + '" stroke-width="2" stroke-linecap="round"><path d="M2.5 7l3 3 6-6"/></svg>';
  btnCheck.addEventListener('click', function(e) { e.stopPropagation(); setClientState(c.cod, 'bought'); });

  const btnX = document.createElement('button');
  btnX.className = 'btn-action btn-x';
  btnX.innerHTML = '<svg viewBox="0 0 14 14" fill="none" stroke="' + xStroke + '" stroke-width="2" stroke-linecap="round"><path d="M3 3l8 8M11 3l-8 8"/></svg>';
  btnX.addEventListener('click', function(e) { e.stopPropagation(); setClientState(c.cod, 'notbought'); });

  const actions = document.createElement('div');
  actions.className = 'card-actions';
  actions.appendChild(btnCheck);
  actions.appendChild(btnX);

  const name = document.createElement('div');
  name.className = 'client-name';
  name.textContent = c.nom;

  // Chip solicitud pendiente (visible sin desplegar)
  const chip = document.createElement('div');
  chip.className = 'sol-chip' + (sol ? ' visible' : '');
  if (sol) {
    chip.innerHTML = '<svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="5" cy="5" r="4"/><path d="M5 3v2.5l1.5 1"/></svg>' + tipoLabel(sol.tipo);
  }

  const info = document.createElement('div');
  info.className = 'client-info';
  info.appendChild(name);
  info.appendChild(chip);

  if (isSearch) {
    const sub = document.createElement('div');
    sub.className = 'client-subtext';
    sub.textContent = c.dia.charAt(0) + c.dia.slice(1).toLowerCase() + ' · ' + c.loc;
    info.appendChild(sub);
  }

  const main = document.createElement('div');
  main.className = 'card-main';
  const num = document.createElement('div');
  num.className = 'order-num';
  num.textContent = c.ord;
  main.appendChild(num);
  main.appendChild(info);
  main.appendChild(actions);
  main.addEventListener('click', function() { card.classList.toggle('expanded'); });

  const detail = document.createElement('div');
  detail.className = 'card-detail';
  detail.innerHTML =
    '<div class="detail-divider"></div>' +
    '<div class="detail-row"><div class="detail-label">Dirección</div><div class="detail-value">' + c.dir + '</div></div>' +
    '<div class="detail-row"><div class="detail-label">Localidad</div><div class="detail-value">' + c.loc + '</div></div>' +
    (isSearch ? '<div class="detail-row"><div class="detail-label">Día</div><div class="detail-value">' + c.dia.charAt(0) + c.dia.slice(1).toLowerCase() + '</div></div>' : '') +
    '<div class="detail-row"><div class="detail-label">Código cliente</div><div class="detail-value">' + c.cod.replace(/[ab]$/,'') + '</div></div>' +
    '<a class="btn-maps" href="' + mapsUrl(c.dir, c.loc) + '" target="_blank">' +
    '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 1C5.8 1 4 2.8 4 5c0 3.5 4 9 4 9s4-5.5 4-9c0-2.2-1.8-4-4-4z"/><circle cx="8" cy="5" r="1.5"/></svg>' +
    'Abrir en Maps</a>';

  const btnSol = document.createElement('button');
  btnSol.className = 'btn-solicitar';
  btnSol.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v5l3 3"/><circle cx="8" cy="8" r="6.5"/></svg> Solicitar cambio en el ruteo';
  btnSol.addEventListener('click', function() { abrirModal(c.cod); });
  detail.appendChild(btnSol);

  card.appendChild(main);
  card.appendChild(detail);
  return card;
}

// ── FILTRO ────────────────────────────────────────────────────────────────────
function applyFilter() {
  const showP = document.getElementById('filter-presencial')?.checked ?? true;
  const showE = document.getElementById('filter-ecom')?.checked ?? true;
  const showT = document.getElementById('filter-telefonico')?.checked ?? true;
  document.querySelectorAll('.client-card').forEach(function(card) {
    const b = card.dataset.canal;
    let show = true;
    if (b === 'presencial') show = showP;
    else if (b === 'ecom') show = showE;
    else if (b === 'telefonico') show = showT;
    card.style.display = show ? '' : 'none';
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderDay() {
  const clients = DATA.filter(function(r) { return r.dia === selectedDay; });
  clients.sort(function(a,b) { return a.ord - b.ord; });

  const bought = clients.filter(function(c) { return stateMap[c.cod] === 'bought'; }).length;
  const notBought = clients.filter(function(c) { return stateMap[c.cod] === 'notbought'; }).length;

  const content = document.getElementById('app-content');
  content.innerHTML = '';

  const stats = document.createElement('div');
  stats.className = 'stats-bar';
  stats.innerHTML =
    '<div class="stat"><div class="stat-num">' + clients.length + '</div><div class="stat-label">Total del día</div></div>' +
    '<div class="stat bought"><div class="stat-num">' + bought + '</div><div class="stat-label">Compraron</div></div>' +
    '<div class="stat notbought"><div class="stat-num">' + notBought + '</div><div class="stat-label">No compraron</div></div>';
  content.appendChild(stats);

  const filterBar = document.createElement('div');
  filterBar.className = 'filter-bar';
  filterBar.innerHTML =
    '<label class="filter-chip presencial"><input type="checkbox" id="filter-presencial" checked onchange="applyFilter()"> Presencial</label>' +
    '<label class="filter-chip ecom"><input type="checkbox" id="filter-ecom" checked onchange="applyFilter()"> Ecommerce</label>' +
    '<label class="filter-chip telefonico"><input type="checkbox" id="filter-telefonico" checked onchange="applyFilter()"> Telefónico</label>';
  content.appendChild(filterBar);

  const list = document.createElement('div');
  list.className = 'list';
  clients.forEach(function(c) { list.appendChild(buildCard(c, false)); });
  content.appendChild(list);
}

function renderDayTabs() {
  const days = [];
  const seen = {};
  DATA.forEach(function(r) { if (!seen[r.dia]) { seen[r.dia] = true; days.push(r.dia); } });
  days.sort(function(a,b) { return DAYS_ORDER.indexOf(a) - DAYS_ORDER.indexOf(b); });
  const strip = document.getElementById('days-strip');
  strip.innerHTML = '';
  days.forEach(function(day) {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (day === selectedDay ? ' active' : '');
    btn.textContent = day.charAt(0) + day.slice(1).toLowerCase();
    btn.onclick = function() {
      selectedDay = day;
      renderDayTabs();
      renderDay();
    };
    strip.appendChild(btn);
  });
}

// INIT
const today = todayDayName();
const dias = [...new Set(DATA.map(function(r) { return r.dia; }))];
selectedDay = dias.includes(today) ? today : 'LUNES';

const d = new Date();
document.getElementById('today-label').textContent =
  d.toLocaleDateString('es-AR', { weekday: 'short', day: 'numeric', month: 'short' });

renderDayTabs();
renderDay();

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) cerrarModal();
});
document.getElementById('confirm-overlay').addEventListener('click', function(e) {
  if (e.target === this) cerrarConfirm();
});
</script>
