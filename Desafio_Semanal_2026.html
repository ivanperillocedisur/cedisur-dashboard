<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Desafío Semanal · Cedisur</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#003087;--orange:#E8732A;--bg:#EEF2F7;--card:#fff;--text:#1A2338;--muted:#64748B;--border:#DDE3EC}
body{font-family:"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}

/* HEADER */
.site-header{background:var(--navy);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.logo{display:flex;align-items:center}
.hright{text-align:right}
.hright .title{color:#fff;font-size:22px;font-weight:800;letter-spacing:.5px;line-height:1}
.hright .dates{color:rgba(255,255,255,.65);font-size:12px;margin-top:2px;font-weight:500}

/* TABS */
.tabs-bar{background:var(--navy);border-top:1px solid rgba(255,255,255,.1)}
.tabs{display:flex;max-width:960px;margin:0 auto;padding:0 2rem;gap:2px;flex-wrap:wrap}
.tab{display:flex;align-items:center;gap:7px;padding:11px 18px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.5);border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:rgba(255,255,255,.85)}
.tab.active{color:#fff;border-bottom-color:var(--orange)}

/* PANEL */
.panel{display:none;padding:1.4rem 2rem 3rem}
.panel.active{display:block}
.panel-inner{max-width:960px;margin:0 auto}

/* GRID */
.grid-wrap{height:460px;overflow-y:auto;padding-right:4px;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
.grid-wrap::-webkit-scrollbar{width:5px}
.grid-wrap::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}

/* CARD — diseño tipo ficha (sin foto) */
.card{
  background:#fff;
  border-radius:14px;
  border:1px solid #E8EDF3;
  border-left:5px solid #F5A623;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  transition:box-shadow .2s,transform .2s;
  display:flex;flex-direction:column;
  padding:16px 18px 14px;
  gap:6px;
  height:auto;
  min-height:170px;
  position:relative;overflow:hidden;
}
.card:hover{box-shadow:0 6px 18px rgba(0,0,0,.1);transform:translateY(-2px)}

/* Top: code + discount badge */
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.c-code{font-size:11px;font-weight:600;color:#94A3B8;letter-spacing:.4px}
.disc-badge{
  background:#F5A623;color:#fff;
  font-size:12px;font-weight:800;letter-spacing:.2px;
  padding:5px 14px;border-radius:20px;white-space:nowrap;
  box-shadow:0 2px 6px rgba(245,166,35,.35);
}
.c-name{font-size:14px;font-weight:700;color:#1A2338;line-height:1.35;
  padding-right:8px}
.c-sub{font-size:12px;color:#94A3B8;margin-top:1px}
.c-div{height:1px;background:#EEF2F7;margin:4px 0}

/* Vence row */
.c-row{display:flex;align-items:center;justify-content:space-between;font-size:12px}
.c-row-label{display:flex;align-items:center;gap:5px;color:#94A3B8}
.c-row-label svg{width:13px;height:13px;flex-shrink:0}
.c-row-val{font-weight:700;color:#1A2338;font-size:13px}

/* Days + stock row */
.c-bottom{display:flex;align-items:center;justify-content:space-between}
.days-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
.du{background:#FEE2E2;color:#991B1B}
.dw{background:#FEF3C7;color:#92400E}
.dok{background:#DCFCE7;color:#166534}
.c-stock{font-size:12px;color:#94A3B8}
.c-stock strong{color:#1A2338;font-weight:600}

/* Price footer */
.c-price-footer{
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid #EEF2F7;padding-top:8px;margin-top:auto;
}
.pts-badge{
  background:#FEF3C7;color:#92400E;
  font-size:11px;font-weight:700;
  padding:4px 10px;border-radius:20px;
  display:flex;align-items:center;gap:4px;
}
.price-block{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.price-label{font-size:9px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px}
.price-row{display:flex;align-items:baseline;gap:8px}
.price-old{font-size:12px;color:#94A3B8;text-decoration:line-through}
.price-new{font-size:17px;font-weight:800;color:#16A34A}

/* scroll hint */
.scroll-hint{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:8px;font-size:11px;color:var(--muted);opacity:.65}

/* RANKING */
.rk-panel{display:none;padding:1.4rem 2rem 3rem}
.rk-panel.active{display:block}
.rk-inner{max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:1.4rem}
.prizes{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.prize{border-radius:14px;padding:16px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;color:#fff}
.prize-1{background:linear-gradient(135deg,#F59E0B,#D97706)}
.prize-2{background:linear-gradient(135deg,#94A3B8,#64748B)}
.prize-3{background:linear-gradient(135deg,#C2855C,#9A6346)}
.prize-medal{font-size:28px;line-height:1}
.prize-place{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;opacity:.85}
.prize-amount{font-size:20px;font-weight:800}
.prize-extras{font-size:11px;opacity:.9;line-height:1.5}
.pts-legend{display:flex;gap:10px;flex-wrap:wrap;background:#fff;border-radius:10px;padding:10px 14px;border:1px solid var(--border);align-items:center;font-size:11px}
.pts-legend b{color:var(--text);font-size:11px;margin-right:4px}
.pts-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-weight:700;background:#EEF2FF;color:#3730A3}
.rk-form{background:#fff;border-radius:14px;padding:16px;border:1px solid var(--border)}
.rk-form h3{font-size:13px;font-weight:700;margin-bottom:10px}
.form-row{display:grid;grid-template-columns:1fr 2fr auto;gap:10px;align-items:end}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.field input,.field select{border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;color:var(--text);background:#fff;outline:none}
.field input:focus,.field select:focus{border-color:var(--navy)}
.btn-reg{background:var(--navy);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;height:36px}
.btn-reg:hover{opacity:.85}
.leaderboard{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden}
.lb-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.lb-header h3{font-size:13px;font-weight:700}
.btn-clear{background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:600}
.btn-clear:hover{border-color:#EF4444;color:#EF4444}
.lb-empty{text-align:center;padding:2rem;color:var(--muted);font-size:13px}
.lb-row{display:grid;grid-template-columns:40px 1fr auto;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)}
.lb-row:last-child{border-bottom:none}
.lb-pos{font-size:20px;text-align:center}
.lb-name{font-size:14px;font-weight:700;display:flex;align-items:center}
.lb-bar-wrap{height:5px;background:var(--border);border-radius:4px;margin-top:4px}
.lb-bar{height:5px;border-radius:4px;transition:width .6s ease}
.lb-bar-1{background:linear-gradient(90deg,#F59E0B,#D97706)}
.lb-bar-2{background:linear-gradient(90deg,#94A3B8,#64748B)}
.lb-bar-3{background:linear-gradient(90deg,#C2855C,#9A6346)}
.lb-bar-rest{background:var(--navy)}
.lb-pts{font-size:15px;font-weight:800;color:var(--navy);white-space:nowrap;text-align:right}
.lb-pts span{font-size:10px;font-weight:600;color:var(--muted);display:block}
.history{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden}
.history summary{padding:12px 16px;font-size:13px;font-weight:700;cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between}
.history summary::after{content:"▾";font-size:11px;color:var(--muted)}
.history[open] summary::after{content:"▴"}
.hist-table{width:100%;border-collapse:collapse;font-size:12px}
.hist-table th{text-align:left;padding:7px 16px;background:var(--bg);color:var(--muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px}
.hist-table td{padding:7px 16px;border-top:1px solid var(--border)}
.hist-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px}
.hist-del:hover{color:#EF4444}
.rk-msg{font-size:12px;color:#16A34A;font-weight:600;display:none;margin-left:8px}

@media(max-width:600px){
  /* Header */
  .site-header{padding:0 1rem;height:52px}
  .hright .title{font-size:17px}
  .hright .dates{font-size:11px}
  /* Tabs */
  .tabs{padding:0 .5rem;gap:0}
  .tab{padding:9px 10px;font-size:12px;gap:5px}
  /* Panels */
  .panel,.rk-panel{padding:1rem .75rem 3rem}
  .rk-inner{gap:1rem}
  /* Artículos */
  .grid{grid-template-columns:1fr}
  .grid-wrap{height:auto;max-height:70vh}
  /* Premios */
  .prizes{grid-template-columns:1fr;gap:8px}
  /* Leyenda de puntos */
  .pts-legend{padding:8px 10px;gap:6px;font-size:10px}
  /* Ranking */
  .lb-header{padding:10px 12px}
  .lb-header h3{font-size:12px}
  .lb-row{padding:10px 12px;gap:8px}
  .lb-pos{font-size:17px}
  .lb-name{font-size:12px}
  .lb-pts{font-size:13px}
  .lb-empty{padding:1.5rem;font-size:12px}
  /* Detalle desplegable */
  .lb-detalle{padding:5px 12px 10px 38px}
  .det-name{font-size:11px}
  .det-header,.det-row{grid-template-columns:1fr 46px 56px}
}
/* ── Detalle por vendedor ── */
.lb-row.clickable{cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,.04)}
.expand-btn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--bg);border:1px solid var(--border);color:var(--muted);margin-left:8px;flex-shrink:0;transition:background .2s,border-color .2s,color .2s,transform .3s;}
.lb-row.open .expand-btn{background:var(--navy);border-color:var(--navy);color:#fff;transform:rotate(180deg)}
.lb-detalle{display:none;background:#F8FAFC;border-bottom:1px solid var(--border);padding:6px 16px 10px 52px}
.lb-detalle.visible{display:block}
.det-header,.det-row{display:grid;grid-template-columns:1fr 52px 62px;align-items:center;gap:6px}
.det-header{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:0 0 5px;border-bottom:1px solid var(--border);margin-bottom:4px}
.det-header span:nth-child(2),.det-header span:nth-child(3){text-align:right}
.det-row{padding:4px 0;border-bottom:1px solid #EEF2F7}
.det-row:last-child{border-bottom:none}
.det-name{color:var(--text);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.det-qty{color:var(--muted);font-size:11px;text-align:right}
.det-pts{color:var(--navy);font-weight:700;font-size:11px;text-align:right}
.vendido-card{opacity:.75}
.vendido-overlay{position:absolute;inset:0;background:rgba(100,116,139,.88);display:flex;align-items:center;justify-content:center;z-index:2}
.vendido-overlay span{color:#fff;font-weight:900;font-size:22px;letter-spacing:4px;text-shadow:0 1px 6px rgba(0,0,0,.3)}
</style>
</head>

    <div class="dates"><span id="vigencia-texto">Cargando...</span></div>
  </div>
</header>

<div class="tabs-bar">
  <div class="tabs">
    <button class="tab active" id="tab-art" onclick="go('art',this)">
      📦 Artículos <span style="font-size:11px;background:rgba(255,255,255,.15);padding:1px 7px;border-radius:10px;margin-left:4px" id="tn-art">...</span>
    </button>
    <button class="tab" id="tab-ranking" onclick="go('ranking',this)">🏆 Ranking vendedores</button>
  </div>
</div>

<!-- ARTÍCULOS -->
<div class="panel active" id="panel-art">
  <div class="panel-inner">
    <div class="grid-wrap">
      <div class="grid" id="grid-art"></div>
    </div>
    <div class="scroll-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
      Deslizá para ver todos los artículos
    </div>
  </div>
</div>

<!-- RANKING -->
<div class="rk-panel" id="panel-ranking">
  <div class="rk-inner">
    <div class="prizes" id="prizes-content"><div style="color:var(--muted);font-size:12px;padding:1rem">Cargando premios...</div></div>
    <div class="pts-legend" id="pts-legend-content"><b>Puntos por artículo:</b> <span style="color:var(--muted);font-size:11px">Cargando...</span></div>

    <div class="leaderboard">
      <div class="lb-header">
        <h3>🏆 Tabla de posiciones</h3>
        <div style="display:flex;align-items:center;gap:10px">
          <span id="last-updated" style="font-size:10px;color:var(--muted);font-weight:400"></span>
          <button class="btn-clear" onclick="fetchRanking()">🔄 Actualizar</button>
        </div>
      </div>
      <div id="lb-body"><div class="lb-empty">Cargando datos...</div></div>
    </div>

  </div>
</div>

<script>
let PRODUCTS = [];
let PTS_POR_SKU = {};
const SHEETS_CSV_URL  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQe71p7NFpbPbY8iLlXORfOfTiob-9LseSWtMphhBOVL1vDhuEQjX69fZORIUwPo13N4E79CdanZtS/pub?gid=271106574&single=true&output=csv";
const SHEETS_ACUM_URL  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQe71p7NFpbPbY8iLlXORfOfTiob-9LseSWtMphhBOVL1vDhuEQjX69fZORIUwPo13N4E79CdanZtS/pub?gid=1572019193&single=true&output=csv";
// SHEETS_STOCK_URL: apuntá a PRODUCTOS_DESAFIO (misma URL que SHEETS_PRODUCTOS_URL, pestaña publicada como CSV)
const SHEETS_STOCK_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQe71p7NFpbPbY8iLlXORfOfTiob-9LseSWtMphhBOVL1vDhuEQjX69fZORIUwPo13N4E79CdanZtS/pubhtml?gid=325901860&single=true";
const SHEETS_PRODUCTOS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQe71p7NFpbPbY8iLlXORfOfTiob-9LseSWtMphhBOVL1vDhuEQjX69fZORIUwPo13N4E79CdanZtS/pubhtml?gid=325901860&single=true";
const SHEETS_CONFIG_URL    = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQe71p7NFpbPbY8iLlXORfOfTiob-9LseSWtMphhBOVL1vDhuEQjX69fZORIUwPo13N4E79CdanZtS/pubhtml?gid=48067084&single=true";

const CAL = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;

function daysBadge(d){
  if(d<=30)  return `<span class="days-badge du">⚠ ${d} días</span>`;
  if(d<=90)  return `<span class="days-badge dw">⏱ ${d} días</span>`;
  return           `<span class="days-badge dok">✓ ${d} días</span>`;
}
function fmt(n){ return "$"+Math.round(n).toLocaleString("es-AR") }


async function initApp(){
  try {
    const tieneProds   = SHEETS_PRODUCTOS_URL && SHEETS_PRODUCTOS_URL !== "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQe71p7NFpbPbY8iLlXORfOfTiob-9LseSWtMphhBOVL1vDhuEQjX69fZORIUwPo13N4E79CdanZtS/pubhtml?gid=325901860&single=true";
    const tieneConfig  = SHEETS_CONFIG_URL    && SHEETS_CONFIG_URL    !== "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQe71p7NFpbPbY8iLlXORfOfTiob-9LseSWtMphhBOVL1vDhuEQjX69fZORIUwPo13N4E79CdanZtS/pubhtml?gid=48067084&single=true";

    const [resProds, resConfig] = await Promise.all([
      tieneProds  ? fetch(SHEETS_PRODUCTOS_URL) : Promise.resolve(null),
      tieneConfig ? fetch(SHEETS_CONFIG_URL)    : Promise.resolve(null),
    ]);

    // ── Parsear PRODUCTOS_DESAFIO ──
    // Columnas: SKU,DESCRIPCION,PROVEEDOR,PRESENTACION,VENCIMIENTO,DESCUENTO_PCT,PRECIO,PUNTOS,STOCK_INICIAL,IMG_URL
    if (resProds && resProds.ok) {
      const text = await resProds.text();
      const today = new Date(); today.setHours(0,0,0,0);
      PRODUCTS = text.trim().split("\n").slice(1).filter(r=>r.trim()).map(r=>{
        const c = parseCSVRow(r);
        const sku   = (c[0]||"").trim();
        const name  = (c[1]||"").trim();
        const prov  = (c[2]||"").trim();
        const size  = (c[3]||"").trim();
        const vence = (c[4]||"").trim();          // DD/MM/YYYY
        const pct   = parseFloat((c[5]||"0").trim().replace(",","."))||0;
        const precio= parseFloat((c[6]||"0").trim().replace(",","."))||0;
        const pts   = parseInt((c[7]||"1").trim())||1;
        const total = parseFloat((c[8]||"0").trim().replace(",","."))||0;
        const img   = ""; // IMG_URL eliminada
        // Días hasta vencimiento
        let dias = 0;
        if(vence){
          const parts = vence.split("/").map(Number);
          if(parts.length===3){
            const vDate = new Date(parts[2], parts[1]-1, parts[0]);
            dias = Math.round((vDate - today)/(1000*60*60*24));
          }
        }
        return {code:sku,name,size,prov,vence,dias,total,pts,pct,precio,img};
      }).filter(p=>p.code);
      PTS_POR_SKU = Object.fromEntries(PRODUCTS.map(p=>[p.code,p.pts]));
    }

    // ── Parsear CONFIG_DESAFIO ──
    // Columnas: CLAVE,VALOR
    const config = {};
    if (resConfig && resConfig.ok) {
      const text = await resConfig.text();
      text.trim().split("\n").slice(1).filter(r=>r.trim()).forEach(r=>{
        const c = parseCSVRow(r);
        const key = (c[0]||"").trim();
        const val = (c[1]||"").trim();
        if(key) config[key] = val;
      });
    }

    // ── Actualizar DOM ──

    // Badge de artículos
    const tnArt = document.getElementById("tn-art");
    if(tnArt) tnArt.textContent = PRODUCTS.length || "0";

    // Vigencia (header)
    const vigEl = document.getElementById("vigencia-texto");
    if(vigEl) vigEl.textContent = config.TEXTO_VIGENCIA || "";

    // Vigencia (footer banner)
    const vigFooter = document.getElementById("vigencia-footer");
    if(vigFooter){
      const txt = config.TEXTO_VIGENCIA
        ? "Oferta válida "+config.TEXTO_VIGENCIA+"."
        : (config.VIGENCIA_INICIO&&config.VIGENCIA_FIN
            ? "Oferta válida del "+config.VIGENCIA_INICIO+" al "+config.VIGENCIA_FIN+"."
            : "");
      vigFooter.textContent = txt;
    }

    // Premios
    const prizesEl = document.getElementById("prizes-content");
    if(prizesEl && (config.PREMIO_1_MONTO||config.PREMIO_2_MONTO)){
      prizesEl.innerHTML =
        `<div class="prize prize-1"><div class="prize-medal">🥇</div><div class="prize-place">1° Puesto</div><div class="prize-amount">${config.PREMIO_1_MONTO||""}</div><div class="prize-extras">${config.PREMIO_1_EXTRA||""}</div></div>`+
        `<div class="prize prize-2"><div class="prize-medal">🥈</div><div class="prize-place">2° Puesto</div><div class="prize-amount">${config.PREMIO_2_MONTO||""}</div><div class="prize-extras">${config.PREMIO_2_EXTRA||""}</div></div>`+
        `<div class="prize prize-3"><div class="prize-medal">🥉</div><div class="prize-place">3° Puesto</div><div class="prize-amount">${config.PREMIO_3_MONTO||""}</div><div class="prize-extras">${config.PREMIO_3_EXTRA||""}</div></div>`;
    }

    // Leyenda de puntos (auto-calculada desde PRODUCTS)
    const legendEl = document.getElementById("pts-legend-content");
    if(legendEl && PRODUCTS.length){
      const byPts = {};
      PRODUCTS.forEach(p=>{
        if(!byPts[p.pts]) byPts[p.pts]=[];
        // Nombre corto: primeras 2 palabras
        const short = p.name.split(" ").slice(0,2).join(" ");
        if(!byPts[p.pts].find(x=>x===short)) byPts[p.pts].push(short);
      });
      const chips = Object.keys(byPts).sort((a,b)=>Number(a)-Number(b)).map(pts=>{
        const n = Number(pts);
        const stars = "⭐".repeat(n);
        return `<span class="pts-chip">${stars} ${n} pt${n>1?"s":""} — ${byPts[pts].join(", ")}</span>`;
      }).join("\n");
      legendEl.innerHTML = `<b>Puntos por artículo:</b>\n${chips}`;
    }

    renderGrid();
    fetchRanking();

  } catch(e) {
    console.error("Error en initApp:", e);
    renderGrid();
    fetchRanking();
  }
}

function renderGrid(stockMap){
  stockMap = stockMap || {};
  const grid = document.getElementById("grid-art");
  grid.innerHTML = PRODUCTS.map(p => {
    const restante = stockMap[p.code] !== undefined ? stockMap[p.code] : p.total;
    const vendido  = restante <= 0;
    const pFinal   = p.precio * (1 - p.pct/100);
    const overlay  = vendido ? '<div class="vendido-overlay"><span>VENDIDO</span></div>' : '';
    const priceBlock = p.precio > 0
      ? `<div class="price-block">
           <div class="price-label">Con descuento</div>
           <div class="price-row">
             <span class="price-old">${fmt(p.precio)}</span>
             <span class="price-new">${fmt(pFinal)}</span>
           </div>
         </div>`
      : `<div class="price-block"><span style="font-size:11px;color:var(--muted)">sin precio</span></div>`;
    return `<div class="card${vendido?' vendido-card':''}">
      ${overlay}
      <div class="card-top">
        <span class="c-code">${p.code}</span>
        <span class="disc-badge">−${p.pct}% OFF</span>
      </div>
      <div class="c-name">${p.name}</div>
      <div class="c-sub">${p.prov} · ${p.size}</div>
      <div class="c-div"></div>
      <div class="c-row">
        <span class="c-row-label">${CAL} Vence</span>
        <span class="c-row-val">${p.vence}</span>
      </div>
      <div class="c-bottom">
        ${daysBadge(p.dias)}
        <span class="c-stock">Stock: <strong>${restante}</strong></span>
      </div>
      <div class="c-price-footer">
        <span class="pts-badge">⭐ ${p.pts} pt${p.pts>1?"s":""}/u</span>
        ${priceBlock}
      </div>
    </div>`;
  }).join("");
}

function go(id,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".panel,.rk-panel").forEach(p=>p.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("panel-"+id).classList.add("active");
}







function parseCSVRow(row){
  const res=[];let cur="";let inQ=false;
  for(let i=0;i<row.length;i++){
    const c=row[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){res.push(cur);cur="";}
    else{cur+=c;}
  }
  res.push(cur);return res;
}

function toggleDetalle(i){
  const det=document.getElementById("det-"+i);
  const row=det?det.previousElementSibling:null;
  if(!det||!row)return;
  const open=det.classList.toggle("visible");
  row.classList.toggle("open",open);
}

function renderRanking(data,detalleMap){
  detalleMap=detalleMap||{};
  const sorted=[...data].sort((a,b)=>b.pts-a.pts);
  const maxPts=sorted.length?sorted[0].pts:1;
  const medals=["🥇","🥈","🥉"];
  const barCls=["lb-bar-1","lb-bar-2","lb-bar-3","lb-bar-rest"];
  const lbBody=document.getElementById("lb-body");
  if(!sorted.length){lbBody.innerHTML='<div class="lb-empty">No hay datos cargados aún.</div>';return;}
  lbBody.innerHTML=sorted.map(({vendor,pts},i)=>{
    const items=(detalleMap[vendor]||[]);
    const tiene=items.length>0;
    const detHTML=items.map(d=>{
      const pu=PTS_POR_SKU[d.sku]||0;
      const pp=Math.round(d.cantidad*pu);
      return `<div class="det-row">`+
             `<span class="det-name">${d.nombre}</span>`+
             `<span class="det-qty">${d.cantidad.toLocaleString("es-AR")} u.</span>`+
             `<span class="det-pts">+${pp} pts</span>`+
             `</div>`;
    }).join("");
    const rowClass="lb-row"+(tiene?" clickable":"");
    const rowClick=tiene?` onclick="toggleDetalle(${i})":`:``;
    const chevron='<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 4 6 8 10 4"/></svg>';
    const icon=tiene?'<span class="expand-btn">'+chevron+'</span>':'';
    const det=tiene
      ?`<div class="lb-detalle" id="det-${i}">`+
        `<div class="det-header"><span>Artículo</span><span>Cant.</span><span>Puntos</span></div>`+
        detHTML+`</div>`
      :'';
    return `<div class="${rowClass}"${rowClick}>`+
           `<div class="lb-pos">${medals[i]||`${i+1}°`}</div>`+
           `<div><div class="lb-name">${vendor}${icon}</div>`+
           `<div class="lb-bar-wrap"><div class="lb-bar ${barCls[Math.min(i,3)]}" style="width:${Math.round(pts/maxPts*100)}%"></div></div>`+
           `</div>`+
           `<div class="lb-pts">${pts.toLocaleString("es-AR")}<span>puntos</span></div>`+
           `</div>${det}`;
  }).join("");
}

async function fetchRanking(){
  const lbBody=document.getElementById("lb-body");
  const lastUpd=document.getElementById("last-updated");
  lbBody.innerHTML='<div class="lb-empty">Cargando datos...</div>';
  if(!SHEETS_CSV_URL||SHEETS_CSV_URL==="https://docs.google.com/spreadsheets/d/e/2PACX-1vTQe71p7NFpbPbY8iLlXORfOfTiob-9LseSWtMphhBOVL1vDhuEQjX69fZORIUwPo13N4E79CdanZtS/pubhtml?gid=271106574&single=true"){
    lbBody.innerHTML='<div class="lb-empty">⚠ Configurá las URLs de Google Sheets en el HTML.</div>';
    return;
  }
  try{
    // Traer RANKING, VENTA ACUMULADA y STOCK en paralelo
    const tieneAcum  = SHEETS_ACUM_URL  && SHEETS_ACUM_URL  !== "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQe71p7NFpbPbY8iLlXORfOfTiob-9LseSWtMphhBOVL1vDhuEQjX69fZORIUwPo13N4E79CdanZtS/pubhtml?gid=1572019193&single=true";
    const tieneStock = SHEETS_STOCK_URL && SHEETS_STOCK_URL !== "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQe71p7NFpbPbY8iLlXORfOfTiob-9LseSWtMphhBOVL1vDhuEQjX69fZORIUwPo13N4E79CdanZtS/pubhtml?gid=325901860&single=true";
    const [resRanking, resAcum, resStock] = await Promise.all([
      fetch(SHEETS_CSV_URL),
      tieneAcum  ? fetch(SHEETS_ACUM_URL)  : Promise.resolve(null),
      tieneStock ? fetch(SHEETS_STOCK_URL) : Promise.resolve(null),
    ]);
    if(!resRanking.ok)throw new Error("HTTP "+resRanking.status);

    // Parsear RANKING
    const textRanking=await resRanking.text();
    const data=textRanking.trim().split("\n").slice(1)
      .filter(r=>r.trim())
      .map(r=>{
        const cols=parseCSVRow(r);
        return{vendor:(cols[0]||"").trim(),pts:parseInt((cols[1]||"0").trim())||0};
      })
      .filter(d=>d.vendor&&d.pts>0);

    // Parsear VENTA ACUMULADA para el detalle
    const detalleMap={};
    if(tieneAcum&&resAcum&&resAcum.ok){
      const textAcum=await resAcum.text();
      textAcum.trim().split("\n").slice(1).filter(r=>r.trim()).forEach(r=>{
        const cols=parseCSVRow(r);
        const vendedor=(cols[0]||"").trim();
        const sku=(cols[1]||"").trim();
        const nombre=(cols[2]||"").trim();
        const cantidad=parseFloat((cols[3]||"0").trim())||0;
        if(!vendedor||!sku)return;
        if(!detalleMap[vendedor])detalleMap[vendedor]=[];
        detalleMap[vendedor].push({sku,nombre,cantidad});
      });
      Object.values(detalleMap).forEach(arr=>
        arr.sort((a,b)=>((PTS_POR_SKU[b.sku]||0)*b.cantidad)-((PTS_POR_SKU[a.sku]||0)*a.cantidad))
      );
    }

    // Parsear STOCK_DESAFIO
    const stockMap={};
    if(tieneStock&&resStock&&resStock.ok){
      const textStock=await resStock.text();
      textStock.trim().split("\n").slice(1).filter(r=>r.trim()).forEach(r=>{
        const cols=parseCSVRow(r);
        const sku=(cols[0]||"").trim();
        const restante=parseFloat((cols[10]||"0").trim())||0; // col K = STOCK_RESTANTE en PRODUCTOS_DESAFIO
        if(sku)stockMap[sku]=restante;
      });
    }

    renderRanking(data,detalleMap);
    renderGrid(stockMap);
    if(lastUpd)lastUpd.textContent="Actualizado: "+new Date().toLocaleString("es-AR");
  }catch(e){
    lbBody.innerHTML='<div class="lb-empty">❌ Error al cargar datos. Verificá las URLs y que las pestañas estén publicadas.</div>';
    console.error(e);
  }
}

initApp();
</script>

      <span id="vigencia-footer" style="font-size:12px;opacity:.85;"></span>

</body>
